name: Build WaitDash EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Windows EXE
        run: |
          go mod tidy
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o waitdash.exe .
          zip waitdash-windows.zip waitdash.exe servers.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: WaitDash Latest Build
          files: waitdash-windows.zip
          make_latest: true
